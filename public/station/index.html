<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estación - Turnero</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a5f 0%, #0f2540 100%);
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo .icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
    .logo h1 { font-size: 1.4rem; color: #1e3a5f; }
    .logo p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
    #pin-input { letter-spacing: 0.5em; text-align: center; font-size: 1.5rem; }
    .actions { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.5rem; }
    .back-link { text-align: center; margin-top: 1rem; }
    .back-link a { color: var(--text-muted); font-size: 0.85rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <span class="icon">🖥️</span>
      <h1>Estación de Atención</h1>
      <p>Selecciona tu nombre e ingresa tu PIN</p>
    </div>
    <div id="alert"></div>
    <div class="form-group">
      <label>¿Quién eres?</label>
      <select id="agent-select">
        <option value="">— Selecciona —</option>
      </select>
    </div>
    <div class="form-group">
      <label>PIN</label>
      <input type="password" id="pin-input" placeholder="••••" autocomplete="off" inputmode="numeric" maxlength="10">
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="login()">Iniciar sesión</button>
    </div>
    <div class="back-link"><a href="/">← Volver al inicio</a></div>
  </div>

  <script>
    async function loadAgents() {
      const res = await fetch('/api/agents');
      const agents = await res.json();
      const sel = document.getElementById('agent-select');
      agents.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = a.name;
        sel.appendChild(opt);
      });
    }

    document.getElementById('pin-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const agent_id = document.getElementById('agent-select').value;
      const pin = document.getElementById('pin-input').value.trim();
      const alertEl = document.getElementById('alert');
      alertEl.innerHTML = '';

      if (!agent_id) {
        alertEl.innerHTML = '<div class="alert alert-error">Selecciona un agente</div>';
        return;
      }
      if (!pin) {
        alertEl.innerHTML = '<div class="alert alert-error">Ingresa tu PIN</div>';
        return;
      }

      try {
        const res = await fetch('/api/auth/station', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent_id: parseInt(agent_id), pin })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('stationAgent', JSON.stringify(data.agent));
          window.location.href = '/station/station.html';
        } else {
          alertEl.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
        }
      } catch {
        alertEl.innerHTML = '<div class="alert alert-error">Error de conexión</div>';
      }
    }

    loadAgents();
  </script>
</body>
</html>
