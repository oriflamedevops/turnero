<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Turnero</title>
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 380px; padding: 2.5rem; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo .icon { font-size: 3rem; }
    .logo h1 { font-size: 1.5rem; margin-top: 0.5rem; }
    .logo p { color: var(--text-muted); font-size: 0.9rem; }
    #pin-input { letter-spacing: 0.5em; text-align: center; font-size: 1.5rem; }
    .actions { display: flex; flex-direction: column; gap: 0.75rem; }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="logo">
      <div class="icon">🔐</div>
      <h1>Panel de Administración</h1>
      <p>Ingresa el PIN para continuar</p>
    </div>
    <div id="alert"></div>
    <div class="form-group">
      <label for="pin-input">Contraseña</label>
      <input type="password" id="pin-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="login()">Entrar</button>
      <a href="/" class="btn" style="text-align:center">← Volver</a>
    </div>
  </div>

  <script>
    // Si ya tiene sesión válida, redirigir
    function tokenExpiry(t) {
      try { return JSON.parse(atob(t.split('.')[1])).exp; } catch { return 0; }
    }
    const saved = sessionStorage.getItem('adminToken');
    if (saved && tokenExpiry(saved) > Date.now() / 1000) {
      window.location.href = '/admin/dashboard.html';
    }

    document.getElementById('pin-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const password = document.getElementById('pin-input').value.trim();
      const alertEl = document.getElementById('alert');
      alertEl.innerHTML = '';
      try {
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem('adminToken', data.token);
          window.location.href = '/admin/dashboard.html';
        } else {
          alertEl.innerHTML = `<div class="alert alert-error">${data.error || 'Contraseña incorrecta'}</div>`;
        }
      } catch {
        alertEl.innerHTML = '<div class="alert alert-error">Error de conexión</div>';
      }
    }
  </script>
</body>
</html>
